<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedge Ad Creative</title>
<style>
  :root{--navy:#0f1e33;--steel:#1c3454;--accent:#e8482b;--gold:#f5a623}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#333;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .ad{position:relative;width:1080px;height:1080px;background:linear-gradient(150deg,#0f1e33 0%,#1c3454 60%,#24406a 100%);overflow:hidden;color:#fff;display:flex;flex-direction:column}
  .ad::after{content:"";position:absolute;right:-160px;top:-120px;width:760px;height:760px;background:radial-gradient(circle,rgba(232,72,43,.28),transparent 62%);pointer-events:none}
  /* roof silhouette bottom */
  .roof{position:absolute;bottom:0;left:0;width:100%;height:300px;pointer-events:none}
  .inner{position:relative;z-index:2;padding:88px 84px;display:flex;flex-direction:column;height:100%}
  .kick{display:inline-flex;align-items:center;gap:12px;align-self:flex-start;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:14px 26px;border-radius:100px;font-size:26px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
  .kick .pin{color:var(--gold);font-size:28px}
  h1{font-size:108px;line-height:1.02;font-weight:800;letter-spacing:-2px;margin-top:52px}
  h1 em{color:#ffc9bd;font-style:normal;display:block}
  .accent-line{color:var(--gold)}
  p.sub{font-size:40px;line-height:1.35;color:#cdd9ea;margin-top:40px;max-width:820px;font-weight:500}
  p.sub b{color:#fff;font-weight:800}
  .spacer{flex:1}
  .row{display:flex;align-items:center;gap:26px;margin-top:20px}
  .cta{display:inline-flex;align-items:center;gap:18px;background:var(--accent);color:#fff;font-size:44px;font-weight:800;padding:32px 54px;border-radius:18px;box-shadow:0 20px 50px rgba(232,72,43,.4)}
  .cta .arw{font-size:40px}
  .freepill{font-size:30px;font-weight:800;color:var(--navy);background:var(--gold);padding:18px 30px;border-radius:14px;letter-spacing:.5px}
  .foot{display:flex;gap:40px;margin-top:44px;font-size:28px;color:#9db0c7;font-weight:700}
  .foot span{display:flex;align-items:center;gap:12px}
  .foot .ck{color:#37d67a;font-size:30px}
</style></head>
<body>
<div class="ad">
  <svg class="roof" viewBox="0 0 1080 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,300 0,190 250,60 500,190 500,300" fill="rgba(255,255,255,0.04)"/>
    <polygon points="560,300 560,150 820,20 1080,150 1080,300" fill="rgba(255,255,255,0.06)"/>
    <rect x="250" y="188" width="250" height="112" fill="rgba(255,255,255,0.03)"/>
    <rect x="820" y="148" width="260" height="152" fill="rgba(255,255,255,0.045)"/>
  </svg>
  <div class="inner">
    <span class="kick"><span class="pin">📍</span> Inland Empire Homeowners</span>
    <h1>What will a <span class="accent-line">new roof</span><em>actually cost you?</em></h1>
    <p class="sub">Get an <b>itemized estimate in 60 seconds</b> with current 2026 IE pricing. No signup. No pushy salesperson.</p>
    <div class="spacer"></div>
    <div class="row">
      <span class="cta">Free Instant Estimate <span class="arw">→</span></span>
      <span class="freepill">100% FREE</span>
    </div>
    <div class="foot">
      <span><span class="ck">✓</span> Materials, labor &amp; tear-off</span>
      <span><span class="ck">✓</span> Takes 60 seconds</span>
    </div>
  </div>
</div>
</body></html>
